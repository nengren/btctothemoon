name: Update BTC Cycle Score

on:
  schedule:
    # 每天 UTC 08:00 运行（北京时间 16:00）
    - cron: '0 8 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-score:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scoring script
        run: python scripts/update_score.py

      - name: Generate content pages
        run: python scripts/generate_pages.py

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python scripts/notify_telegram.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "BTC Score Bot"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "daily update: ${DATE}"
            git push
          else
            echo "No changes to commit"
          fi
